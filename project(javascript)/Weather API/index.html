<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft UI API Dashboard</title>
  <link rel="stylesheet" href="STYLE.CSS">
</head>

<body>

  <h1>Glassy Dashboard</h1>

  <div class="grid-layout">

    <section>
      <h3>🐶 Puppy View</h3>
      <button id="dogBtn">New Image</button>
      <img id="dogImage" src="https://images.dog.ceo/breeds/pinniped/n02524738_3641.jpg" alt="Dog">
    </section>

    <section>
      <h3>📊 Virus Scan</h3>
      <input id="country" type="text" placeholder="Type country name...">
      <button id="coronaBtn">Get Stats</button>
      <div id="coronaResult" class="info-box">
        <p id="cases">Cases: -</p>
        <p id="deaths">Deaths: -</p>
        <p id="recovered">Recovered: -</p>
      </div>
    </section>

    <section>
      <h3>🎬 Movie Hub</h3>
      <button id="movieBtn">New Movie</button>
      <div id="movieResult" class="info-box">Find your favorite movie</div>
    </section>

    <section>
      <h3>☀️ Weather Info</h3>
      <input id="cityName" type="text" placeholder="City name...">
      <button id="weatherBtn">Check</button>
      <div id="weatherResult" class="info-box">Atmosphere details</div>
    </section>

  </div>

  <script src="./script.js"></script>
</body>

</html>
