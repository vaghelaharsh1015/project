<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK Mart | Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./asset/css/style.css">
</head>
<body class="bg-light" style="padding-top: 90px;">

  <nav class="navbar navbar-expand-lg fixed-top shadow-sm bg-white">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">HK Mart</a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill px-3">Continue Shopping</a>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="fw-bold mb-4">Your Shopping Cart</h2>
    
    <div id="cart-empty" class="text-center py-5 bg-white rounded-4 shadow-sm" style="display: none;">
      <i class="bi bi-cart-x display-1 text-muted"></i>
      <h3 class="mt-3">Your cart is empty</h3>
      <p class="text-muted">Looks like you haven't added anything yet.</p>
      <a href="index.html" class="btn btn-primary rounded-pill px-4">Shop Now</a>
    </div>

    <div id="cart-item-container" class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-light">
            <tr>
              <th class="ps-4 py-3 border-0">Product</th>
              <th class="py-3 border-0">Name</th>
              <th class="py-3 border-0">Quantity</th>
              <th class="py-3 border-0">Price</th>
              <th class="py-3 border-0 text-center">Action</th>
            </tr>
          </thead>
          <tbody id="cart-body">
            </tbody>
        </table>
      </div>
      <div class="p-4 bg-light border-top text-end">
        <h4 class="fw-bold">Total: <span id="cart-total" class="text-primary">$0.00</span></h4>
        <button class="btn btn-success btn-lg rounded-pill px-5 mt-2">Checkout</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/cart.mjs"></script>
</body>
</html>
