<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK Mart | Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./asset/css/style.css">
</head>

<body class="bg-light" style="padding-top: 90px;">

  <nav class="navbar navbar-expand-lg fixed-top shadow-sm bg-white">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">HK Mart</a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill px-3">Continue Shopping</a>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="fw-bold mb-4">Your Shopping Cart</h2>
    <div class="row">
      <div class="col-lg-8">
        <div id="cart-empty" class="text-center py-5 bg-white rounded-4 shadow-sm" style="display: none;">
          <i class="bi bi-cart-x display-1 text-muted"></i>
          <h3 class="mt-3">Your cart is empty</h3>
          <p class="text-muted">Looks like you haven't added anything yet.</p>
          <a href="index.html" class="btn btn-primary rounded-pill px-4">Shop Now</a>
        </div>
      </div>
      <div class="col-lg-8" id="cart-item-container">
        <div  class="card border-0 shadow-sm rounded-4 overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="bg-light">
                <tr>
                  <th class="ps-4 py-3 border-0">Product</th>
                  <th class="py-3 border-0">Name</th>
                  <th class="py-3 border-0">Quantity</th>
                  <th class="py-3 border-0">Price</th>
                  <th class="py-3 border-0 text-center">Action</th>
                </tr>
              </thead>
              <tbody id="cart-body">
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 100px;" id="cart-summary"
          style="display: none;">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4">Order Summary</h5>
            <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span id="subtotal"
                class="fw-bold">$0.00</span></div>
            <div class="d-flex justify-content-between mb-2"><span>Tax (10%)</span><span id="tax"
                class="fw-bold">$0.00</span></div>
            <div class="d-flex justify-content-between mb-3"><span>Shipping</span><span id="shipping"
                class="text-success fw-bold">$5.00</span></div>
            <hr class="my-4">
            <div class="d-flex justify-content-between mb-4">
              <span class="h5 fw-bold">Grand Total</span>
              <span id="total" class="h5 fw-bold text-primary">$0.00</span>
            </div>
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" id="checkout-btn">Proceed to
              Checkout</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  </div>
  </div>

  <script type="module" src="./js/cart.mjs"></script>
</body>

</html>
